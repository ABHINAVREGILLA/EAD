<!DOCTYPE html>
<html>
<head>
    <title>Responsive Login Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        input:focus {
            border-color: #4e73df;
            outline: none;
            box-shadow: 0 0 5px rgba(78,115,223,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #4e73df;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e59d9;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        .success {
            color: green;
            font-weight: bold;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .login-container {
                width: 90%;
                padding: 20px;
            }

            input, button {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button id="loginBtn">Login</button>

    <div id="message"></div>
</div>

<script>

    function loginAttempts() {
        let attempts = 0;   
        return function() {
            attempts++;
            return attempts;
        }
    }

    const trackAttempts = loginAttempts();  
    document.getElementById("loginBtn").addEventListener("click", function() {

        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();
        let messageDiv = document.getElementById("message");

        messageDiv.innerHTML = "";
        messageDiv.className = "";

        if (username === "") {
            messageDiv.innerHTML = "Username cannot be empty";
            messageDiv.classList.add("error");
            return;
        }

        if (password.length < 6) {
            messageDiv.innerHTML = "Password must be at least 6 characters";
            messageDiv.classList.add("error");
            return;
        }
        const correctUsername = "ABHINAV";
        const correctPassword = "200604";

        if (username === correctUsername && password === correctPassword) {
            messageDiv.innerHTML = "Login Successful!";
            messageDiv.classList.add("success");
            return;
        } else {
            let attemptCount = trackAttempts();

            if (attemptCount >= 3) {
                messageDiv.innerHTML = "Account locked! Too many failed attempts.";
                messageDiv.classList.add("error");
                document.getElementById("loginBtn").disabled = true;
            } else {
                messageDiv.innerHTML = 
                    "Invalid credentials. Attempts left: " + (3 - attemptCount);
                messageDiv.classList.add("error");
            }
        }

    });

</script>

</body>
</html>
